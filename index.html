 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Fun Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #fcfcfc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .mobile-screen {
            width: 360px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            padding-bottom: 20px;
        }

        /* Top Bar */
        .market-summary {
            display: flex;
            padding: 15px;
            gap: 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        .index-box { font-size: 12px; color: #444; }
        .index-val { font-weight: bold; color: #000; margin: 4px 0; }
        .red-text { color: #eb5b3c; font-size: 11px; }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
            font-weight: 500;
            color: #777;
        }
        .active-tab { color: #5367ff; border-bottom: 2px solid #5367ff; padding-bottom: 10px; }

        /* Returns Content */
        .content { padding: 20px; }
        .returns-label { color: #888; font-size: 13px; margin-bottom: 8px; }
        
        #profit-val {
            font-size: 28px;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .positive { color: #00d09c; }
        .negative { color: #eb5b3c; }

        /* Instrument Row */
        .instrument-card {
            margin-top: 40px;
            padding-top: 15px;
            border-top: 1px solid #f8f8f8;
        }
        .inst-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #444;
        }
        .inst-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            color: #888;
            font-size: 12px;
        }

        #safe-exit {
            float: right;
            color: #5367ff;
            font-size: 12px;
            border: 1px solid #eee;
            padding: 4px 8px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="mobile-screen">
    <div class="market-summary">
        <div class="index-box">
            <div>SENSEX</div>
            <div class="index-val" id="top-sensex">72,839.48</div>
            <div class="red-text">-743.74 (1.01%)</div>
        </div>
        <div class="index-box">
            <div>NIFTY 50</div>
            <div class="index-val" id="top-nifty">22,624.65</div>
            <div class="red-text">-194.95 (0.85%)</div>
        </div>
    </div>

    <div class="tabs">
        <span>Explore</span>
        <span class="active-tab">Positions</span>
        <span>Orders</span>
    </div>

    <div class="content">
        <span id="safe-exit">Set Safe Exit 🛡️</span>
        <div class="returns-label">Total Returns</div>
        <div id="profit-val" class="positive">+₹485.00</div>

        <div class="instrument-card">
            <div class="inst-header">
                <div>SENSEX <span id="current-date"></span> 72500 Put</div>
                <div style="color: #5367ff;">-20 ></div>
            </div>
            <div class="inst-footer">
                <div>Avg ₹814.95</div>
                <div id="mkt-val">Mkt ₹790.70</div>
            </div>
        </div>
    </div>
</div>

<script>
    let profit = 485.00;
    let sensex = 72839.48;
    let mktPrice = 790.70;

    // Date Auto-set
    function setDate() {
        const d = new Date();
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        document.getElementById('current-date').innerText = ("0" + d.getDate()).slice(-2) + " " + months[d.getMonth()];
    }

    // Numbers Update logic
    function liveUpdate() {
        setInterval(() => {
            // Profit change (-15 se +15 range)
            let change = (Math.random() * 30 - 15);
            profit += change;

            const pElement = document.getElementById('profit-val');
            let formatted = Math.abs(profit).toLocaleString('en-IN', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

            if (profit >= 0) {
                pElement.innerText = "+₹" + formatted;
                pElement.className = "positive";
            } else {
                pElement.innerText = "-₹" + formatted;
                pElement.className = "negative";
            }

            // Market Price and Sensex movement
            mktPrice += (Math.random() * 2 - 1);
            sensex += (Math.random() * 10 - 5);

            document.getElementById('mkt-val').innerText = "Mkt ₹" + mktPrice.toFixed(2);
            document.getElementById('top-sensex').innerText = sensex.toLocaleString('en-IN', {minimumFractionDigits: 2});

        }, 1000); // 1 second update
    }

    setDate();
    liveUpdate();
</script>

</body>
</html>
